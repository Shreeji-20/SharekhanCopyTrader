services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: copytrading
      POSTGRES_USER: copytrader
      POSTGRES_PASSWORD: copytrader_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copytrader -d copytrading"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

  broker-router:
    build: ./apps/broker-router
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

  worker:
    build: ./apps/worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      broker-router:
        condition: service_started
    env_file:
      - .env

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file:
      - .env

volumes:
  postgres_data:

